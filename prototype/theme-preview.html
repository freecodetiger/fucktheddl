<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fucktheddl Theme Preview</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      color: #121a1d;
      background: #f4f5f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 8%, rgba(255, 255, 255, 0.96), transparent 30%),
        linear-gradient(135deg, #fbfbfa 0%, #eef1f2 46%, #e4e9eb 100%);
    }

    .page {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 36px 22px 46px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 26px;
    }

    h1 {
      margin: 0;
      font-size: clamp(31px, 4.6vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.055em;
      font-weight: 780;
    }

    .hero p {
      max-width: 680px;
      margin: 12px 0 0;
      color: rgba(18, 26, 29, 0.62);
      font-size: 16px;
      line-height: 1.58;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .legend span {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(17, 17, 17, 0.08);
      color: rgba(17, 17, 17, 0.62);
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(18px);
    }

    .themes {
      display: grid;
      grid-template-columns: repeat(3, minmax(310px, 1fr));
      gap: 22px;
      align-items: start;
    }

    .theme-card {
      display: grid;
      gap: 14px;
    }

    .note {
      min-height: 146px;
      padding: 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(20, 20, 20, 0.08);
      box-shadow: 0 20px 54px rgba(20, 30, 36, 0.08);
      backdrop-filter: blur(22px);
    }

    .note h2 {
      margin: 0;
      font-size: 21px;
      letter-spacing: -0.025em;
    }

    .note p {
      margin: 8px 0 0;
      color: rgba(18, 26, 29, 0.62);
      font-size: 13px;
      line-height: 1.55;
    }

    .palette {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.08),
        0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .phone {
      --canvas: #ffffff;
      --panel: rgba(255, 255, 255, 0.96);
      --ink: #14282e;
      --ink-soft: #355158;
      --muted: #75858a;
      --divider: #e3e8ea;
      --accent: #2f7d8c;
      --accent-soft: #eaf3f5;
      --risk: #d88a3d;
      --risk-soft: #fff5e9;
      --danger: #c94f4f;
      --danger-soft: #ffeceb;
      --success: #6fa58b;
      --success-soft: #eff6f2;
      --bottom: rgba(255, 255, 255, 0.96);
      --shadow: 0 34px 90px rgba(20, 40, 46, 0.13);
      position: relative;
      width: min(100%, 390px);
      height: 830px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 42px;
      color: var(--ink);
      background: var(--canvas);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
    }

    .theme-dark .phone {
      --canvas: #000000;
      --panel: #1c1c1e;
      --ink: #f5f5f7;
      --ink-soft: #d1d1d6;
      --muted: #8e8e93;
      --divider: #2c2c2e;
      --accent: #f5f5f7;
      --accent-soft: #2c2c2e;
      --risk: #8e8e93;
      --risk-soft: #1c1c1e;
      --danger: #f5f5f7;
      --danger-soft: #2c2c2e;
      --success: #c7c7cc;
      --success-soft: #2c2c2e;
      --bottom: #000000;
      --shadow: none;
      border-color: #1c1c1e;
    }

    .theme-fog .phone {
      --canvas: #f7f9fb;
      --panel: rgba(255, 255, 255, 0.82);
      --ink: #172332;
      --ink-soft: #41556a;
      --muted: #718197;
      --divider: #dfe7ee;
      --accent: #5f7e9b;
      --accent-soft: #edf3f8;
      --risk: #c58b47;
      --risk-soft: #fff4e6;
      --danger: #c85d65;
      --danger-soft: #ffedef;
      --success: #6c9f91;
      --success-soft: #eef7f4;
      --bottom: rgba(250, 252, 254, 0.92);
      --shadow: 0 34px 90px rgba(38, 66, 88, 0.16);
      border-color: rgba(255, 255, 255, 0.88);
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), transparent 20%),
        radial-gradient(circle at 82% 2%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 34%);
    }

    .theme-dark .phone::before {
      background: none;
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .status {
      height: 42px;
      padding: 15px 24px 0;
      display: flex;
      justify-content: space-between;
      color: var(--ink);
      font-size: 12px;
      font-weight: 760;
    }

    .header {
      padding: 18px 22px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .date {
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.045em;
      font-weight: 780;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pill {
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--success);
      background: var(--success-soft);
      font-size: 12px;
      font-weight: 700;
    }

    .settings-dot {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 17px;
      font-weight: 760;
    }

    .content {
      min-height: 0;
      padding: 0 18px 12px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
    }

    .section {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }

    .section-label {
      display: flex;
      gap: 8px;
      padding-left: 2px;
      align-items: center;
      font-size: 13px;
      font-weight: 760;
    }

    .section-label span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .list {
      min-height: 0;
      overflow: hidden;
      padding: 5px 0;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--divider);
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.045);
      backdrop-filter: blur(22px);
    }

    .theme-dark .list {
      box-shadow: none;
    }

    .theme-dark .pill,
    .theme-dark .settings-dot,
    .theme-dark .delete,
    .theme-dark .confirm-delete i {
      color: var(--ink-soft);
      background: #2c2c2e;
    }

    .theme-dark .confirm-delete b {
      color: #000;
      background: var(--ink);
    }

    .row {
      display: grid;
      grid-template-columns: 16px 84px 1fr auto;
      min-height: 42px;
      gap: 10px;
      align-items: center;
      padding: 0 12px;
    }

    .todo-row {
      grid-template-columns: 16px 52px 1fr auto;
    }

    .rail {
      width: 2px;
      height: 42px;
      margin: 0 auto;
      border-radius: 999px;
      background: var(--divider);
      position: relative;
    }

    .rail::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: var(--dot, var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--dot, var(--accent)) 16%, transparent);
    }

    .check {
      width: 10px;
      height: 10px;
      margin: 0 auto;
      border-radius: 4px;
      border: 2px solid var(--dot, var(--accent));
    }

    .time,
    .due {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .due {
      color: var(--dot, var(--accent));
    }

    .item strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.14;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete {
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--danger-soft);
      color: var(--danger);
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .confirm-delete {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .confirm-delete b,
    .confirm-delete i {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-style: normal;
      font-weight: 760;
    }

    .confirm-delete b {
      color: #fff;
      background: var(--danger);
    }

    .confirm-delete i {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .bottom {
      height: 106px;
      padding: 12px 22px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      background: var(--bottom);
      border-top: 1px solid var(--divider);
      backdrop-filter: blur(26px) saturate(1.18);
    }

    .nav-item {
      display: grid;
      place-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
    }

    .nav-item.active {
      color: var(--ink);
    }

    .icon {
      width: 29px;
      height: 29px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mic {
      width: 60px;
      height: 60px;
      margin: 0 auto;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: #111;
      box-shadow: 0 14px 34px rgba(17, 17, 17, 0.2);
    }

    .theme-dark .mic {
      color: #000000;
      background: #f5f5f7;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 10px 28px rgba(245, 245, 247, 0.10);
    }

    .theme-dark .mic .icon {
      stroke-width: 2.35;
    }

    .theme-fog .mic {
      background: #152233;
      box-shadow: 0 14px 34px rgba(21, 34, 51, 0.2);
    }

    .settings-sheet {
      position: absolute;
      z-index: 4;
      left: 18px;
      right: 18px;
      top: 96px;
      padding: 16px;
      border-radius: 28px;
      color: var(--ink);
      background: color-mix(in srgb, var(--panel) 92%, var(--canvas));
      border: 1px solid var(--divider);
      box-shadow: 0 24px 72px rgba(10, 20, 28, 0.18);
      backdrop-filter: blur(24px);
    }

    .theme-classic .settings-sheet,
    .theme-dark .settings-sheet {
      display: none;
    }

    .sheet-title {
      margin: 0 0 14px;
      font-size: 24px;
      letter-spacing: -0.04em;
      font-weight: 780;
    }

    .group-title {
      margin: 12px 0 8px;
      font-size: 12px;
      font-weight: 760;
      color: var(--ink);
    }

    .theme-option,
    .info-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--divider);
      background: color-mix(in srgb, var(--panel) 70%, transparent);
      margin-top: 7px;
    }

    .theme-option.selected {
      border-color: color-mix(in srgb, var(--accent) 28%, var(--divider));
      background: var(--accent-soft);
    }

    .small-swatch {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--accent);
    }

    .theme-option strong,
    .info-row strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
    }

    .theme-option span,
    .info-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .selected-text {
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
    }

    .info-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--ink);
    }

    @media (max-width: 1160px) {
      .themes {
        grid-template-columns: 1fr;
      }

      .theme-card {
        grid-template-columns: minmax(300px, 390px) 1fr;
        align-items: start;
      }

      .note {
        order: 2;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 24px 14px 36px;
      }

      .hero {
        display: block;
      }

      .legend {
        justify-content: flex-start;
        margin-top: 16px;
      }

      .theme-card {
        grid-template-columns: 1fr;
      }

      .phone {
        width: min(100%, 390px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <h1>三套主题色预览</h1>
        <p>同一个移动工作台，分别套用经典浅色、深色、雾蓝。预览包含首页双时间线、删除二次确认、底部语音入口，以及设置里的三主题选择。</p>
      </div>
      <div class="legend" aria-label="theme goals">
        <span>苹果式克制</span>
        <span>语音优先</span>
        <span>低误删风险</span>
      </div>
    </header>

    <section class="themes">
      <article class="theme-card theme-classic">
        <section class="note">
          <h2>经典浅色</h2>
          <p>当前方向。纯白底、蓝绿主行动、黑白底栏。最适合作为默认主题，因为它稳定、安静、阅读负担最低。</p>
          <div class="palette">
            <i class="swatch" style="background:#ffffff"></i>
            <i class="swatch" style="background:#14282e"></i>
            <i class="swatch" style="background:#2f7d8c"></i>
            <i class="swatch" style="background:#111111"></i>
          </div>
        </section>
        <div class="phone" aria-label="经典浅色预览">
          <div class="app">
            <div data-status></div>
            <div data-content></div>
            <div data-bottom></div>
          </div>
        </div>
      </article>

      <article class="theme-card theme-dark">
        <section class="note">
          <h2>深色</h2>
          <p>纯黑底、深灰内容面、白色主强调。去掉蓝色、渐变和多彩风险色，更接近克制的 iOS 原生深色模式。</p>
          <div class="palette">
            <i class="swatch" style="background:#000000"></i>
            <i class="swatch" style="background:#1c1c1e"></i>
            <i class="swatch" style="background:#f5f5f7"></i>
            <i class="swatch" style="background:#2c2c2e"></i>
          </div>
        </section>
        <div class="phone" aria-label="深色预览">
          <div class="app">
            <div data-status></div>
            <div data-content></div>
            <div data-bottom></div>
          </div>
        </div>
      </article>

      <article class="theme-card theme-fog">
        <section class="note">
          <h2>雾蓝</h2>
          <p>第三套浅色替代主题。比经典浅色更冷静、更有空间感，适合不想用深色但希望弱化绿色的人。</p>
          <div class="palette">
            <i class="swatch" style="background:#f7f9fb"></i>
            <i class="swatch" style="background:#172332"></i>
            <i class="swatch" style="background:#5f7e9b"></i>
            <i class="swatch" style="background:#c85d65"></i>
          </div>
        </section>
        <div class="phone" aria-label="雾蓝预览">
          <div class="app">
            <div data-status></div>
            <div data-content></div>
            <div data-bottom></div>
          </div>
          <section class="settings-sheet" aria-label="设置主题预览">
            <h3 class="sheet-title">设置</h3>
            <div class="group-title">连接</div>
            <div class="info-row"><i class="info-dot"></i><strong>后端连接</strong><span>正常</span></div>
            <div class="group-title">外观</div>
            <div class="theme-option"><i class="small-swatch" style="background:#2f7d8c"></i><strong>经典浅色</strong><span></span></div>
            <div class="theme-option"><i class="small-swatch" style="background:#111"></i><strong>深色</strong><span></span></div>
            <div class="theme-option selected"><i class="small-swatch" style="background:#5f7e9b"></i><strong>雾蓝</strong><span class="selected-text">已选</span></div>
            <div class="group-title">关于</div>
            <div class="info-row"><i class="info-dot"></i><strong>版本</strong><span>0.1.0</span></div>
          </section>
        </div>
      </article>
    </section>
  </main>

  <template id="status-template">
    <div>
      <div class="status"><span>9:41</span><span>5G  82%</span></div>
      <header class="header">
        <div class="date">4月30日 星期四</div>
        <div class="header-actions">
          <span class="pill">本地</span>
          <span class="settings-dot">⌘</span>
        </div>
      </header>
    </div>
  </template>

  <template id="content-template">
    <section class="content">
      <section class="section">
        <div class="section-label">日程 <span>今天 3</span></div>
        <div class="list">
          <div class="row" style="--dot: var(--success)"><i class="rail"></i><span class="time">09:00</span><div class="item"><strong>金山面试</strong><span>远程 · 准备项目介绍</span></div><span class="delete">删除</span></div>
          <div class="row" style="--dot: var(--accent)"><i class="rail"></i><span class="time">11:00</span><div class="item"><strong>地理课</strong><span>主楼 302</span></div><span class="confirm-delete"><b>删除</b><i>取消</i></span></div>
          <div class="row" style="--dot: var(--risk)"><i class="rail"></i><span class="time">15:30</span><div class="item"><strong>产品评审</strong><span>带方案草图</span></div><span class="delete">删除</span></div>
          <div class="row" style="--dot: var(--accent)"><i class="rail"></i><span class="time">明天</span><div class="item"><strong>腾讯二面</strong><span>10:00</span></div><span class="delete">删除</span></div>
        </div>
      </section>

      <section class="section">
        <div class="section-label">待办 <span>4</span></div>
        <div class="list">
          <div class="row todo-row" style="--dot: var(--danger)"><i class="check"></i><span class="due">今天</span><div class="item"><strong>完成笔试复盘</strong><span>整理错题和时间复杂度</span></div></div>
          <div class="row todo-row" style="--dot: var(--risk)"><i class="check"></i><span class="due">明天</span><div class="item"><strong>投递三家公司</strong><span>更新简历备注</span></div></div>
          <div class="row todo-row" style="--dot: var(--accent)"><i class="check"></i><span class="due">5/6</span><div class="item"><strong>准备面试材料</strong><span>项目图和自我介绍</span></div></div>
          <div class="row todo-row" style="--dot: var(--success)"><i class="check"></i><span class="due">5/8</span><div class="item"><strong>归档课程资料</strong><span>低优先级</span></div></div>
        </div>
      </section>
    </section>
  </template>

  <template id="bottom-template">
    <nav class="bottom" aria-label="bottom navigation">
      <div class="nav-item active">
        <svg class="icon" viewBox="0 0 32 32" aria-hidden="true"><rect x="6" y="8" width="20" height="18" rx="5"></rect><path d="M6 14h20M12 6v5M20 6v5"></path><circle cx="14" cy="19" r="1.5"></circle><circle cx="20" cy="19" r="1.5"></circle></svg>
        <span>日程</span>
      </div>
      <div class="mic">
        <svg class="icon" viewBox="0 0 32 32" aria-hidden="true"><rect x="12" y="4" width="8" height="15" rx="4"></rect><path d="M7 14v2c0 5 4 8 9 8s9-3 9-8v-2M16 24v4M12 28h8"></path></svg>
      </div>
      <div class="nav-item">
        <svg class="icon" viewBox="0 0 32 32" aria-hidden="true"><rect x="6" y="6" width="20" height="20" rx="6"></rect><path d="M11 15l3 3 7-8M12 23h10"></path></svg>
        <span>待办</span>
      </div>
    </nav>
  </template>

  <script>
    document.querySelectorAll("[data-status]").forEach((target) => {
